<div class="sidebar d-flex flex-column">
    <div class="mb-5 px-2">
        <h4 class="fw-bold"><span style="color: #60a5fa;">YNAD</span> <small style="font-size: 0.6em; color: #94a3b8;">CONSTRUCTION</small></h4>
    </div>
    
    <div class="mb-5 px-2 d-flex align-items-center">
        <img id="userPhoto" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="rounded-circle me-3 border border-2 border-secondary" width="50" height="50">
        <div>
            <h6 id="userName" class="mb-0 fw-bold small text-white">...</h6>
            <p class="mb-0 text-muted" style="font-size: 10px;"><span id="userDesig">...</span> | <span id="userID">...</span></p>
        </div>
    </div>

    <nav class="flex-grow-1">
        <a href="#" class="nav-link active"><i class="fas fa-calendar-plus me-3"></i> Daily Report Entry</a>
        <a href="#" class="nav-link"><i class="fas fa-folder-open me-3"></i> My Reports</a>
        <a href="#" class="nav-link"><i class="fas fa-chart-bar me-3"></i> Yearly Summary</a> <a href="#" class="nav-link"><i class="fas fa-user-circle me-3"></i> My Profile</a> </nav>

    <a href="#" class="nav-link text-danger mt-auto" onclick="logout()"><i class="fas fa-sign-out-alt me-3"></i> Logout</a>
</div>

<div class="main-content">
    <div class="top-nav d-flex justify-content-between align-items-center">
        <button id="langToggle" class="btn btn-sm btn-outline-primary rounded-pill px-3 fw-bold">EN | বাংলা</button>
        <div class="text-end">
            <span id="currentMonthDisplay" class="fw-bold d-block text-primary">April</span>
            <small id="currentYearDisplay" class="text-muted fw-bold">2026</small>
        </div>
    </div>

    <div class="report-title-section text-center">
        <h1 class="title-main fw-bold text-uppercase" style="font-size: 2.2rem;">Monthly Official Working Report</h1>
        <p class="title-sub text-muted">- Field Office -</p>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-xl-9">
                <div id="holidayBadge" class="alert alert-danger border-0 shadow-sm text-center fw-bold mb-4" style="display: none; border-radius: 12px; background-color: #fff1f2; color: #d63031;">
                    <i class="fas fa-calendar-times me-2"></i> Ajj Weekly Holiday (Friday)!
                </div>

                <div class="entry-card shadow-sm bg-white p-5" style="border-radius: 24px;">
                    <form id="dailyReportForm">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Select Date</label>
                                <input type="date" id="entryDate" class="form-control p-3" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Day of Week</label>
                                <input type="text" id="entryDay" class="form-control p-3 bg-light fw-bold" readonly>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold text-muted">Working Details *</label>
                                <textarea id="workDetails" class="form-control p-3" rows="5" required placeholder="Describe your tasks..."></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-muted">Remarks</label>
                                <select id="workRemarks" class="form-select p-3 text-muted" style="opacity: 0.6;">
                                    <option value="" selected>Select</option> <option value="Work on Outside">Work on Outside</option>
                                    <option value="Personal Leave">Personal Leave</option>
                                    <option value="Medical Leave">Medical Leave</option>
                                    <option value="Special Leave">Special Leave</option>
                                    <option value="Marital Leave">Marital Leave</option>
                                    <option value="Parental Leave">Parental Leave</option>
                                    <option value="Non-Pay Leave">Non-Pay Leave</option>
                                    <option value="Absent">Absent</option>
                                </select>
                            </div>
                            <div class="col-12 text-end mt-4">
                                <button type="submit" class="btn btn-dark px-5 py-3 fw-bold rounded-3 shadow">Save Daily Report</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted small border-top bg-white">
        Copyright © 2026 / Developed by Md. Abu Sayeed
    </footer>
</div>

<style>
    /* Friday Red Styling */
    .friday-red {
        color: #d63031 !important;
        border-color: #fecaca !important;
        background-color: #fff1f2 !important;
    }
</style>
