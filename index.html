<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNAD Portal | Daily Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --ynad-blue: #2d3448; --ynad-accent: #4a90e2; --holiday-red: #d63031; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }

        /* Sidebar Style */
        .sidebar { width: 260px; height: 100vh; background: var(--ynad-blue); position: fixed; color: white; padding: 20px; z-index: 1000; }
        .nav-link { color: #94a3b8; padding: 12px 15px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; display: block; text-decoration: none; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: white; font-weight: 600; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }

        /* Main Content Container */
        .main-content { margin-left: 260px; min-height: 100vh; display: flex; flex-direction: column; }
        .top-nav { background: white; padding: 15px 40px; border-bottom: 1px solid #e2e8f0; }

        /* Report Header - Large & Middle */
        .report-title-section { text-align: center; padding: 40px 0 20px; }
        .title-main { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; color: #0f172a; margin-bottom: 0; }
        .title-sub { font-size: 1.1rem; color: #64748b; font-weight: 500; }

        /* Entry Form Card */
        .entry-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; padding: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .form-label { font-size: 0.85rem; font-weight: 700; color: #475569; text-transform: uppercase; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 12px; padding: 12px 16px; border: 1px solid #cbd5e1; font-size: 0.95rem; }
        .form-control:focus { box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1); border-color: var(--ynad-accent); }

        /* Holiday Red Logic */
        .is-holiday { color: var(--holiday-red) !important; border-color: var(--holiday-red) !important; background-color: #fff1f2 !important; }
        .holiday-badge { display: none; background: #fff1f2; color: var(--holiday-red); padding: 12px; border-radius: 12px; border: 1px solid #fecaca; margin-bottom: 20px; font-weight: 600; text-align: center; }

        /* Footer */
        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 0.8rem; color: #94a3b8; border-top: 1px solid #e2e8f0; background: white; }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column">
        <div class="mb-5 px-2">
            <h4 class="fw-bold"><span style="color: #60a5fa;">YNAD</span> <small style="font-size: 0.6em; color: #94a3b8;">CONSTRUCTION</small></h4>
        </div>
        
        <div class="mb-5 px-2 d-flex align-items-center">
            <img id="userPhoto" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="rounded-circle me-3 border border-2 border-secondary" width="50" height="50">
            <div>
                <h6 id="userName" class="mb-0 fw-bold small text-white">...</h6>
                <p id="userRoleInfo" class="mb-0 text-muted" style="font-size: 10px;"><span id="userDesig">...</span> | <span id="userID">...</span></p>
            </div>
        </div>

        <nav class="flex-grow-1">
            <a href="#" class="nav-link active"><i class="fas fa-calendar-plus me-3"></i> Daily Report Entry</a>
            <a href="#" class="nav-link"><i class="fas fa-folder-open me-3"></i> My Reports</a>
            <a href="#" class="nav-link"><i class="fas fa-chart-pie me-3"></i> Monthly Summary</a>
        </nav>

        <a href="#" class="nav-link text-danger mt-auto" onclick="logout()"><i class="fas fa-sign-out-alt me-3"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="top-nav d-flex justify-content-between align-items-center">
            <button id="langToggle" class="btn btn-sm btn-light border rounded-pill px-3 fw-bold text-muted">EN | বাংলা</button>
            <div class="d-flex align-items-center">
                <div class="text-end me-3">
                    <span id="currentMonthDisplay" class="fw-bold d-block" style="color: var(--ynad-accent);">April</span>
                    <small id="currentYearDisplay" class="text-muted fw-bold">2026</small>
                </div>
                <div class="bg-light p-2 rounded-circle"><i class="fas fa-bell text-muted"></i></div>
            </div>
        </div>

        <div class="report-title-section">
            <h1 class="title-main text-uppercase">Monthly Official Working Report</h1>
            <p class="title-sub" id="officeReportTitle">- Field Office -</p>
        </div>

        <div class="container pb-5">
            <div class="row justify-content-center">
                <div class="col-xl-9">
                    
                    <div id="holidayBadge" class="holiday-badge">
                        <i class="fas fa-mug-hot me-2"></i> Today is Friday — Enjoy your Weekly Holiday!
                    </div>

                    <div class="entry-card shadow-sm">
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                            <h5 class="fw-bold mb-0">Daily Progress Entry</h5>
                            <span class="text-muted small"><i class="fas fa-clock me-1"></i> Future dates are locked</span>
                        </div>

                        <form id="dailyReportForm">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Select Date</label>
                                    <input type="date" id="entryDate" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Day of Week</label>
                                    <input type="text" id="entryDay" class="form-control bg-light fw-bold" readonly>
                                </div>
                                
                                <div class="col-12">
                                    <label class="form-label">Working Details <span class="text-danger">*</span></label>
                                    <textarea id="workDetails" class="form-control" rows="5" placeholder="What did you accomplish today?" required></textarea>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label">Remarks / Status</label>
                                    <select id="workRemarks" class="form-select text-muted" style="opacity: 0.7;">
                                        <option value="" selected>Select</option>
                                        <option value="Work on Outside">Work on Outside</option>
                                        <option value="Personal Leave">Personal Leave</option>
                                        <option value="Medical Leave">Medical Leave</option>
                                        <option value="Special Leave">Special Leave</option>
                                        <option value="Marital Leave">Marital Leave</option>
                                        <option value="Parental Leave">Parental Leave</option>
                                        <option value="Non-Pay Leave">Non-Pay Leave</option>
                                        <option value="Absent">Absent</option>
                                    </select>
                                </div>

                                <div class="col-12 text-end mt-5">
                                    <button type="submit" class="btn px-5 py-3 text-white fw-bold shadow-sm" style="background: var(--ynad-blue); border-radius: 12px;">
                                        Save Daily Report
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            Copyright © 2026 / Developed by Md. Abu Sayeed
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
