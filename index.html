<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNAD HR - Secure Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --admin-color: #e74c3c; --user-color: #27ae60; }
        body { background-color: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Login Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        /* Main UI */
        .header-bg { background: var(--primary); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px; position: relative; }
        .hidden { display: none !important; }
        
        /* Float Button */
        .add-emp-btn { position: absolute; bottom: -25px; right: 50px; width: 60px; height: 60px; border-radius: 50%; background: var(--admin-color); color: white; border: 4px solid white; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; text-decoration: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box text-center">
        <h3 class="fw-bold mb-4">YNAD Portal Login</h3>
        <input type="text" id="loginId" class="form-control mb-3" placeholder="Enter Employee ID">
        <input type="password" id="loginPin" class="form-control mb-4" placeholder="Enter PIN">
        <button onclick="attemptLogin()" class="btn btn-primary w-100 fw-bold py-2">Login</button>
        <p id="loginError" class="text-danger mt-3 small hidden">Invalid ID or PIN!</p>
    </div>
</div>

<div id="mainContent" class="hidden">
    <div class="header-bg text-center">
        <div class="container">
            <h1 class="fw-bold">YNAD CONSTRUCTION</h1>
            <p id="userWelcome" class="opacity-75">Welcome, User</p>
            <button onclick="logout()" class="btn btn-sm btn-outline-light mt-2">Logout</button>
        </div>
        <a href="#" id="adminAddBtn" class="add-emp-btn hidden" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
            <i class="fas fa-user-plus"></i>
        </a>
    </div>

    <div class="container mb-5">
        <div class="card p-4 shadow-sm border-0 rounded-4 mb-4">
            <h5 class="fw-bold text-success mb-3"><i class="fas fa-edit"></i> Submit Daily Report</h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="currentUserDisplay" class="form-control bg-light" readonly>
                </div>
                <div class="col-md-3">
                    <input type="date" id="workDate" class="form-control">
                </div>
                <div class="col-md-5">
                    <input type="text" id="workDetails" class="form-control" placeholder="Work description...">
                </div>
                <div class="col-12 text-end">
                    <button class="btn btn-success px-5">Submit</button>
                </div>
            </div>
        </div>

        <div class="card p-4 shadow-sm border-0 rounded-4">
            <h5 class="fw-bold mb-4">Monthly Working Records</h5>
            <div id="adminFilter" class="row g-3 mb-4 hidden">
                <div class="col-md-6"><select id="filterEmp" class="form-select"></select></div>
                <div class="col-md-4"><input type="month" id="filterMonth" class="form-control"></div>
                <div class="col-md-2"><button class="btn btn-dark w-100">Filter</button></div>
            </div>
            <div id="userFilter" class="row g-3 mb-4">
                <div class="col-md-10"><input type="month" class="form-control" placeholder="Select Month"></div>
                <div class="col-md-2"><button class="btn btn-primary w-100">View My Data</button></div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr><th>Date</th><th>Day</th><th>Working Details</th><th>Remarks</th></tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <tr><td colspan="4" class="text-center text-muted">No records found.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addEmployeeModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Admin: Register New Employee</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted text-center">Admin Only Form for NID, Bank A/C, Salary, etc.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
