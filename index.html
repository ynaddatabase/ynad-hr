<div class="main-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="lang-switcher">
            <button id="langToggle" class="btn btn-sm btn-outline-secondary rounded-pill px-3">EN | বাংলা</button>
        </div>
        <div class="text-end">
            <h4 class="fw-bold text-primary mb-0" id="currentMonthDisplay">April</h4>
            <p class="text-muted small mb-0" id="currentYearDisplay">2026</p>
        </div>
    </div>

    <div class="report-header-middle text-center mb-4">
        <h2 class="report-title-large fw-bold text-uppercase">Monthly Official Working Report</h2>
        <p class="report-subtitle-small text-muted">- Field Office -</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div id="holidayMsg" class="alert alert-danger border-danger mb-4 hidden" style="border-radius: 12px; display: none;">
                <i class="fas fa-calendar-day me-2"></i> Today is Friday - Weekly Holiday!
            </div>

            <div class="entry-card shadow-sm bg-white p-4" style="border-radius: 20px; border: 1px solid #e1e8ef;">
                <h5 class="fw-bold mb-4 border-bottom pb-2">Daily Report Entry</h5>
                
                <form id="dailyReportForm">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Select Date</label>
                            <input type="date" id="entryDate" class="form-control date-field" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Day</label>
                            <input type="text" id="entryDay" class="form-control bg-light fw-bold day-field" readonly>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Working Details *</label>
                            <textarea id="workDetails" class="form-control" rows="4" placeholder="Enter work details..." required></textarea>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Remarks</label>
                            <select id="workRemarks" class="form-select text-secondary" style="opacity: 0.8;">
                                <option value="" selected>Select</option>
                                <option value="Work on Outside">Work on Outside</option>
                                <option value="Personal Leave">Personal Leave</option>
                                <option value="Medical Leave">Medical Leave</option>
                                <option value="Special Leave">Special Leave</option>
                                <option value="Marital Leave">Marital Leave</option>
                                <option value="Parental Leave">Parental Leave</option>
                                <option value="Non-Pay Leave">Non-Pay Leave</option>
                                <option value="Absent">Absent</option>
                            </select>
                        </div>

                        <div class="col-12 text-end mt-4">
                            <button type="submit" class="btn btn-dark px-5 py-2 rounded-3">Save Report</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Friday Red Color Logic */
    .holiday-red {
        color: #d63031 !important;
        border-color: #ff7675 !important;
        font-weight: bold !important;
    }
    .report-title-large { font-size: 1.8rem; }
    .report-subtitle-small { font-size: 1rem; }
</style>
