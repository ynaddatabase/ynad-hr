<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNAD HR Portal - Employee View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #333; }
        
        /* Login & Overlays */
        #loginOverlay { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), #1a252f); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* Employee Header Style */
        .employee-header { background: white; border-radius: 0 0 25px 25px; border-bottom: 1px solid #eee; }
        .profile-img-container img { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #eef2f7; object-fit: cover; }
        
        /* Helper Classes */
        .hidden { display: none !important; }
        .office-badge { font-size: 0.75rem; padding: 4px 12px; border-radius: 50px; font-weight: 600; }
        .month-box { background: #f0f4f8; padding: 10px 20px; border-radius: 15px; border: 1px solid #dce4ec; }

        /* Welcome Modal */
        .modal-content-welcome { border-radius: 30px; border: none; padding: 25px; }
        .splash-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--success); margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box text-center shadow-lg">
        <h4 class="fw-bold mb-4">YNAD PORTAL LOGIN</h4>
        <input type="text" id="loginId" class="form-control mb-3 p-3 rounded-3" placeholder="Employee ID">
        <input type="password" id="loginPin" class="form-control mb-4 p-3 rounded-3" placeholder="Secret PIN">
        <button onclick="attemptLogin()" class="btn btn-primary w-100 fw-bold py-3 shadow">Enter Dashboard</button>
        <p id="loginError" class="text-danger mt-3 small hidden">Invalid ID or PIN!</p>
    </div>
</div>

<div class="modal fade" id="welcomeModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-welcome text-center shadow-lg">
            <div class="modal-body">
                <img id="welcomePhoto" src="" class="splash-img shadow">
                <h3 id="welcomeName" class="fw-bold mb-1">...</h3>
                <p id="welcomeID" class="text-muted small">ID: ...</p>
                <div id="roleBadge" class="badge bg-success p-2 px-4 rounded-pill mb-3">ACCESS GRANTED</div>
                <div class="small text-muted"><i class="fas fa-circle-notch fa-spin"></i> Preparing your environment...</div>
            </div>
        </div>
    </div>
</div>

<div id="mainContent" class="hidden">
    <header class="employee-header p-3 shadow-sm mb-4">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-4 d-flex align-items-center">
                    <div class="profile-img-container me-3">
                        <img id="userPhoto" src="" alt="Profile">
                    </div>
                    <div>
                        <h5 id="userName" class="mb-0 fw-bold">...</h5>
                        <p class="mb-0 text-muted small"><span id="userDesig">...</span> | ID: <span id="userID">...</span></p>
                        <span id="officeTag" class="badge office-badge bg-primary-subtle text-primary border mt-1">...</span>
                    </div>
                </div>

                <div class="col-md-4 text-center">
                    <h6 class="fw-bold mb-0 text-uppercase tracking-wider text-muted small">Monthly Official Working Report</h6>
                    <p id="officeReportTitle" class="mb-0 fw-bold text-dark">- Dhaka Office -</p>
                </div>

                <div class="col-md-4 d-flex justify-content-end align-items-center">
                    <div class="month-box text-center me-3">
                        <h5 id="currentMonthDisplay" class="mb-0 fw-bold text-primary">...</h5>
                        <p id="currentYearDisplay" class="mb-0 small text-muted fw-bold">2026</p>
                    </div>
                    <button onclick="logout()" class="btn btn-outline-danger btn-sm rounded-pill"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="roleBasedSection" class="card p-4 border-0 shadow-sm rounded-4 text-center">
            <h5 class="text-muted">Welcome to YNAD CONSTRUCTION Portal</h5>
            <p>Ready to start your session.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
