<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNAD Portal - Employee Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --sidebar-bg: #2d3448; --accent: #4a90e2; --bg-light: #f4f7fa; --holiday: #d63031; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; height: 100vh; background: var(--sidebar-bg); position: fixed; padding: 25px; color: white; transition: 0.3s; z-index: 1000; }
        .nav-link { color: #a4b0be; padding: 12px 15px; border-radius: 12px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }

        /* Main Content */
        .main-wrapper { margin-left: 280px; padding: 30px; flex: 1; }
        
        /* Middle Header Styling */
        .report-header-middle { text-align: center; margin-bottom: 30px; }
        .report-title-large { font-size: 1.6rem; font-weight: 800; color: #2d3448; text-transform: uppercase; margin-bottom: 2px; }
        .report-subtitle-small { font-size: 0.95rem; font-weight: 600; color: #636e72; }

        /* Holiday Alerts */
        .holiday-alert { background-color: #fff5f5; border: 1px solid var(--holiday); color: var(--holiday); border-radius: 12px; padding: 15px; display: none; font-weight: 600; }
        .text-holiday { color: var(--holiday) !important; font-weight: 700; }

        /* Form Styling */
        .entry-card { background: white; border-radius: 20px; padding: 35px; border: 1px solid #e1e8ef; }
        .footer { margin-left: 280px; padding: 20px; text-align: center; font-size: 13px; color: #636e72; background: white; border-top: 1px solid #e1e8ef; }
        
        /* Language Switch */
        .lang-switch { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column">
        <div class="d-flex justify-content-between align-items-center mb-5 px-2">
            <h4 class="fw-bold mb-0">YNAD</h4>
            <div class="lang-switch text-uppercase" id="langToggle">EN | BN</div>
        </div>
        
        <div class="user-profile mb-5 px-2">
            <div class="d-flex align-items-center">
                <img id="userPhoto" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="rounded-circle me-3" width="55" height="55" style="border: 2px solid rgba(255,255,255,0.2);">
                <div>
                    <h6 id="userName" class="mb-0 fw-bold small text-white">...</h6>
                    <p id="userRoleInfo" class="mb-0 text-muted" style="font-size: 11px;"><span id="userDesig">...</span> | <span id="userID">...</span></p>
                    </div>
            </div>
        </div>

        <nav class="nav flex-column flex-grow-1">
            <a class="nav-link active" href="#"><i class="fas fa-edit me-3"></i> Daily Report Entry</a>
            <a class="nav-link" href="#"><i class="fas fa-file-invoice me-3"></i> My Reports</a>
            <a class="nav-link" href="#"><i class="fas fa-calendar-check me-3"></i> Monthly Summary</a>
            <a class="nav-link text-danger mt-auto" href="#" onclick="logout()"><i class="fas fa-power-off me-3"></i> Logout</a>
        </nav>
    </div>

    <div class="main-wrapper">
        <div class="report-header-middle">
            <h2 class="report-title-large">Monthly Official Working Report</h2>
            <p class="report-subtitle-small" id="officeReportTitle">- Field Office -</p>
            <div class="mt-2 fw-bold text-primary"><span id="currentMonthDisplay">April</span>, <span id="currentYearDisplay">2026</span></div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    
                    <div id="holidayMsg" class="holiday-alert mb-4">
                        <i class="fas fa-calendar-day me-2"></i> Today is Friday - Weekly Holiday!
                    </div>

                    <div class="entry-card shadow-sm">
                        <h5 class="fw-bold mb-4 border-bottom pb-3">Daily Report Entry</h5>
                        
                        <form id="dailyReportForm">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted">Select Date</label>
                                    <input type="date" id="entryDate" class="form-control" required>
                                </div>
                                
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted">Day</label>
                                    <input type="text" id="entryDay" class="form-control bg-light fw-bold" readonly>
                                </div>

                                <div class="col-12">
                                    <label class="form-label small fw-bold text-muted">Working Details *</label>
                                    <textarea id="workDetails" class="form-control" rows="4" placeholder="Enter work details..." required></textarea>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label small fw-bold text-muted">Remarks (Optional)</label>
                                    <select id="workRemarks" class="form-select">
                                        <option value="" selected>Select a remark (Optional)</option>
                                        <option value="Present">Present</option>
                                        <option value="Work on Outside">Work on Outside</option>
                                        <option value="Personal Leave">Personal Leave</option>
                                        <option value="Medical Leave">Medical Leave</option>
                                        <option value="Special Leave">Special Leave</option>
                                        <option value="Marital Leave">Marital Leave</option>
                                        <option value="Parental Leave">Parental Leave</option>
                                        <option value="Non-Pay Leave">Non-Pay Leave</option>
                                        <option value="Absent">Absent</option>
                                    </select>
                                </div>

                                <div class="col-12 text-end mt-4">
                                    <button type="submit" class="btn btn-dark px-5 py-2 rounded-3">Save Report</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        Copyright © 2026 / Developed by Md. Abu Sayeed
    </footer>

    <script src="script.js"></script>
</body>
</html>
